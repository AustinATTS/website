<section class="auth-page">
  <mat-card class="auth-card">
    <mat-card-header>
      <mat-card-title>
        <span class="material-icons auth-icon">person_add</span>
        Create Account
      </mat-card-title>
      <mat-card-subtitle>Join the community - sign up for free.</mat-card-subtitle>
    </mat-card-header>

    <mat-card-content>
      @if (error()) {
        <div class="error-message">
          <span class="material-icons">error</span>
          {{ error() }}
        </div>
      }

      <div class="social-buttons">
        <button mat-stroked-button type="button" class="social-btn google-btn" (click)="signInWithGoogle()" [disabled]="!!socialLoading()">
          @if (socialLoading() === 'google') {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            <svg class="social-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z"/><path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/><path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18A10.96 10.96 0 0 0 1 12c0 1.77.42 3.45 1.18 4.93l3.66-2.84z"/><path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/></svg>
            Sign up with Google
          }
        </button>
        <button mat-stroked-button type="button" class="social-btn github-btn" (click)="signInWithGithub()" [disabled]="!!socialLoading()">
          @if (socialLoading() === 'github') {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            <svg class="social-icon" viewBox="0 0 24 24" width="20" height="20"><path fill="currentColor" d="M12 1.27a11 11 0 0 0-3.48 21.46c.55.09.73-.28.73-.55v-1.84c-3.03.64-3.67-1.46-3.67-1.46-.55-1.29-1.28-1.65-1.28-1.65-.92-.65.1-.65.1-.65 1.1 0 1.73 1.1 1.73 1.1.92 1.65 2.57 1.2 3.21.92a2.16 2.16 0 0 1 .64-1.47c-2.47-.27-5.04-1.19-5.04-5.5 0-1.1.46-2.1 1.1-2.76a3.55 3.55 0 0 1 .1-2.64s.84-.27 2.75 1.02a9.58 9.58 0 0 1 5.02 0c1.91-1.29 2.75-1.02 2.75-1.02.55 1.29.2 2.4.1 2.64.73.73 1.1 1.65 1.1 2.76 0 4.32-2.57 5.23-5.04 5.5.45.37.82.92.82 2.01v3.03c0 .27.18.64.73.55A11 11 0 0 0 12 1.27"/></svg>
            Sign up with GitHub
          }
        </button>
      </div>

      <div class="social-divider">
        <mat-divider></mat-divider>
        <span>or</span>
        <mat-divider></mat-divider>
      </div>

      <form (ngSubmit)="onSubmit()" class="auth-form">
        <mat-form-field appearance="outline">
          <mat-label>Display Name</mat-label>
          <input matInput type="text" [(ngModel)]="displayName" name="displayName" required autocomplete="name" />
          <mat-icon matPrefix>badge</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Email</mat-label>
          <input matInput type="email" [(ngModel)]="email" name="email" required autocomplete="email" />
          <mat-icon matPrefix>email</mat-icon>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Password</mat-label>
          <input matInput [type]="hidePassword() ? 'password' : 'text'" [(ngModel)]="password" name="password" required autocomplete="new-password" />
          <mat-icon matPrefix>lock</mat-icon>
          <button mat-icon-button matSuffix type="button" (click)="hidePassword.set(!hidePassword())">
            <mat-icon>{{ hidePassword() ? 'visibility_off' : 'visibility' }}</mat-icon>
          </button>
        </mat-form-field>

        <mat-form-field appearance="outline">
          <mat-label>Confirm Password</mat-label>
          <input matInput [type]="hidePassword() ? 'password' : 'text'" [(ngModel)]="confirmPassword" name="confirmPassword" required autocomplete="new-password" />
          <mat-icon matPrefix>lock_outline</mat-icon>
        </mat-form-field>

        <button mat-raised-button color="primary" type="submit" [disabled]="submitting()" class="submit-btn">
          @if (submitting()) {
            <mat-spinner diameter="20"></mat-spinner>
          } @else {
            Create Account
          }
        </button>
      </form>
    </mat-card-content>

    <mat-card-actions>
      <p class="auth-switch">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    </mat-card-actions>
  </mat-card>
</section>
